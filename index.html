<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Centros Comunitarios DIF Municipal — Chihuahua</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --azul:         #0d2d6b;
    --azul-medio:   #1a4b9e;
    --azul-cielo:   #00adef;
    --azul-cielo-c: #e6f7fd;
    --rosa:         #e8197d;
    --rosa-claro:   #fde8f3;
    --verde:        #1a9e5f;
    --verde-claro:  #e6f7ee;
    --gris-bg:      #f2f4f8;
    --gris-borde:   #dce1ea;
    --texto:        #0d1f3c;
    --texto-suave:  #5a6a84;
    --texto-hint:   #9aaabe;
    --blanco:       #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--gris-bg); color: var(--texto);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--azul);
    padding: 0 20px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 4px solid var(--azul-cielo);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 0; right: 0;
    height: 4px;
    background: var(--rosa);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    height: 42px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
  }
  .header-divider {
    width: 1px; height: 32px;
    background: rgba(255,255,255,0.2);
  }
  .header-titulo h1 {
    font-size: 14px; font-weight: 700;
    color: white; letter-spacing: 0.3px; line-height: 1.2;
    text-transform: uppercase;
  }
  .header-titulo p {
    font-size: 10px; font-weight: 400;
    color: var(--azul-cielo);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .header-stats { display: flex; gap: 28px; align-items: center; }
  .stat { text-align: center; }
  .stat-num {
    font-size: 22px; font-weight: 800;
    color: var(--azul-cielo); line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 9px; font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .stat-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.15); }

  /* ── LAYOUT ── */
  .main { flex: 1; display: flex; overflow: hidden; margin-top: 4px; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 285px; flex-shrink: 0;
    background: var(--blanco);
    border-right: 1px solid var(--gris-borde);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 2px 0 8px rgba(13,45,107,0.06);
  }
  .sidebar-top { padding: 13px; border-bottom: 1px solid var(--gris-borde); }
  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px; stroke: var(--texto-hint); fill: none;
  }
  #buscador {
    width: 100%; padding: 8px 10px 8px 30px;
    border: 1.5px solid var(--gris-borde); border-radius: 8px;
    font-family: 'Montserrat', sans-serif; font-size: 12px;
    color: var(--texto); background: var(--gris-bg); outline: none;
    transition: border-color 0.2s;
  }
  #buscador:focus { border-color: var(--azul-cielo); }
  #buscador::placeholder { color: var(--texto-hint); }

  .filtros { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
  .filtro-btn {
    font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--gris-borde);
    background: white; color: var(--texto-suave); cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .filtro-btn .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink:0; }
  .filtro-btn.active-todos    { background: var(--azul); color: white; border-color: var(--azul); }
  .filtro-btn.active-cc       { background: var(--azul-cielo-c); color: var(--azul-medio); border-color: var(--azul-cielo); }
  .filtro-btn.active-cedefam  { background: var(--rosa-claro);   color: var(--rosa);        border-color: var(--rosa); }
  .filtro-btn.active-stem     { background: var(--verde-claro);  color: var(--verde);       border-color: var(--verde); }

  .lista-count {
    padding: 7px 13px 6px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--texto-hint);
    border-bottom: 1px solid var(--gris-borde); flex-shrink: 0;
  }
  .lista-centros { flex: 1; overflow-y: auto; }
  .lista-centros::-webkit-scrollbar { width: 3px; }
  .lista-centros::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }

  .lista-item {
    padding: 10px 13px; border-bottom: 1px solid var(--gris-borde);
    cursor: pointer; transition: background 0.13s;
    display: flex; align-items: flex-start; gap: 9px;
  }
  .lista-item:hover { background: var(--gris-bg); }
  .lista-item.activo { background: #eef4ff; border-left: 3px solid var(--azul-medio); }
  .lista-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .lista-nombre { font-size: 12px; font-weight: 600; color: var(--texto); line-height: 1.3; }
  .lista-meta { display: flex; gap: 5px; margin-top: 3px; align-items: center; flex-wrap: wrap; }
  .lista-zona { font-size: 10px; color: var(--texto-hint); font-weight: 500; }
  .lista-tipo-tag {
    font-size: 9px; font-weight: 700; padding: 1px 7px;
    border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .tag-cc      { background: var(--azul-cielo-c); color: var(--azul-medio); }
  .tag-cedefam { background: var(--rosa-claro);   color: var(--rosa); }
  .tag-stem    { background: var(--verde-claro);  color: var(--verde); }
  .lista-empty { padding: 32px 16px; text-align: center; color: var(--texto-hint); font-size: 12px; }

  /* ── MAPA ── */
  #map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* ── LOADER ── */
  .loader {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 999; background: white; border-radius: 12px; padding: 16px 22px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--gris-borde); font-size: 12px;
    color: var(--texto-suave); font-weight: 500;
    box-shadow: 0 4px 20px rgba(13,45,107,0.1);
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid var(--gris-borde);
    border-top-color: var(--azul-cielo);
    border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TARJETA PANEL ── */
  .card-panel {
    width: 335px; flex-shrink: 0;
    background: var(--blanco);
    border-left: 1px solid var(--gris-borde);
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    box-shadow: -4px 0 16px rgba(13,45,107,0.08);
  }
  .card-panel.visible { transform: translateX(0); }

  .card-foto-wrap { position: relative; flex-shrink: 0; }
  .card-close {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(13,45,107,0.5); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 13px; font-weight: 700; z-index: 10;
    transition: background 0.15s; font-family: 'Montserrat', sans-serif;
  }
  .card-close:hover { background: rgba(13,45,107,0.75); }

  .card-foto { width: 100%; height: 175px; object-fit: cover; display: block; }
  .card-foto-placeholder {
    width: 100%; height: 175px;
    background: linear-gradient(135deg, #eef4ff 0%, #dce8ff 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .card-foto-placeholder svg { width: 40px; height: 40px; stroke: var(--azul-medio); fill: none; opacity: 0.3; }
  .card-foto-placeholder span { font-size: 11px; font-weight: 600; color: var(--texto-hint); text-transform: uppercase; letter-spacing: 0.06em; }

  /* Banda de color tipo bajo la foto */
  .card-tipo-banda {
    height: 5px;
    flex-shrink: 0;
  }
  .banda-cc      { background: var(--azul-cielo); }
  .banda-cedefam { background: var(--rosa); }
  .banda-stem    { background: var(--verde); }

  .card-body { flex: 1; overflow-y: auto; padding: 18px; }
  .card-body::-webkit-scrollbar { width: 3px; }
  .card-body::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 2px; }

  .card-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  }
  .badge-cc      { background: var(--azul-cielo-c); color: var(--azul-medio); }
  .badge-cedefam { background: var(--rosa-claro);   color: var(--rosa); }
  .badge-stem    { background: var(--verde-claro);  color: var(--verde); }

  .card-nombre {
    font-size: 18px; font-weight: 800;
    color: var(--azul); line-height: 1.2; margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: -0.3px;
  }
  .card-direccion {
    font-size: 11px; font-weight: 400; color: var(--texto-suave);
    margin-bottom: 14px; display: flex; align-items: flex-start; gap: 4px; line-height: 1.5;
  }
  .card-direccion svg { width: 12px; height: 12px; stroke: var(--azul-cielo); fill: none; flex-shrink: 0; margin-top: 1px; }
  .card-descripcion {
    font-size: 12px; color: var(--texto-suave); line-height: 1.65;
    margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--gris-borde);
    font-weight: 400;
  }

  .card-section-title {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--texto-hint); margin-bottom: 10px; margin-top: 16px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--gris-borde);
  }

  .card-info-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-info-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--gris-bg); display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .card-info-icon svg { width: 14px; height: 14px; stroke: var(--azul-cielo); fill: none; }
  .card-info-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--texto-hint); margin-bottom: 1px; }
  .card-info-value { font-size: 12px; font-weight: 600; color: var(--texto); line-height: 1.4; }

  .clases-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .clase-tag {
    font-size: 10px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; background: var(--gris-bg);
    color: var(--texto-suave); border: 1px solid var(--gris-borde);
    text-transform: uppercase; letter-spacing: 0.03em;
  }

  /* Leaflet overrides */
  .leaflet-control-zoom a {
    font-family: 'Montserrat', sans-serif !important;
    font-weight: 700 !important;
    color: var(--azul) !important;
  }
  .leaflet-control-attribution {
    font-family: 'Montserrat', sans-serif !important;
    font-size: 9px !important;
  }
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbyxA0_I54q_L95Nqh-MzjMBkMoX_-QkRTH_T3ADXiHHEbLl5AaSURzQLLnauXIFeAPA/exec";

const TIPOS = {
  cc:      { label: 'Centro Comunitario', color: '#00adef', bandaClass: 'banda-cc',      badgeClass: 'badge-cc',      tagClass: 'tag-cc'      },
  cedefam: { label: 'CEDEFAM',            color: '#e8197d', bandaClass: 'banda-cedefam', badgeClass: 'badge-cedefam', tagClass: 'tag-cedefam' },
  stem:    { label: 'STEM',               color: '#1a9e5f', bandaClass: 'banda-stem',    badgeClass: 'badge-stem',    tagClass: 'tag-stem'    },
};

function tipoKey(raw) {
  if (!raw) return 'cc';
  const v = String(raw).toLowerCase().trim();
  if (v === 'cedefam') return 'cedefam';
  if (v === 'stem')    return 'stem';
  return 'cc';
}

let centros = [], markers = [], filtroActivo = 'todos', map;

function makeIcon(tipo) {
  const t = TIPOS[tipo] || TIPOS.cc;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 32 44">
    <path d="M16 1C8.3 1 2 7.3 2 15C2 26.5 16 43 16 43S30 26.5 30 15C30 7.3 23.7 1 16 1Z"
      fill="${t.color}" stroke="white" stroke-width="2"/>
    <circle cx="16" cy="15" r="6" fill="white" opacity="0.95"/>
    <circle cx="16" cy="15" r="3" fill="${t.color}"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [32, 44], iconAnchor: [16, 44], popupAnchor: [0, -46] });
}

function icoSVG(path) {
  return `<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}

function mostrarTarjeta(c) {
  const tipo = tipoKey(c.tipo), t = TIPOS[tipo];
  const fotoDiv = document.getElementById('card-foto-contenedor');
  const body    = document.getElementById('card-body');
  const banda   = document.getElementById('card-banda');

  banda.className = 'card-tipo-banda ' + t.bandaClass;

  if (c.foto_url && String(c.foto_url).trim()) {
    fotoDiv.innerHTML = `<img class="card-foto" src="${c.foto_url}" alt="${c.cc}"
      onerror="this.parentElement.innerHTML='<div class=card-foto-placeholder><svg viewBox=\\'0 0 24 24\\' stroke-width=\\'1.2\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><path d=\\'m21 15-5-5L5 21\\'/></svg><span>Sin foto registrada</span></div>'"/>`;
  } else {
    fotoDiv.innerHTML = `<div class="card-foto-placeholder">${icoSVG('<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>')}<span>Sin foto registrada</span></div>`;
  }

  const clases = c.clases ? String(c.clases).split(',').map(s => s.trim()).filter(Boolean) : [];
  const clasesHTML = clases.length
    ? `<div class="clases-wrap">${clases.map(cl => `<span class="clase-tag">${cl}</span>`).join('')}</div>`
    : `<span style="font-size:11px;color:var(--texto-hint);font-weight:500;">Sin información registrada</span>`;

  body.innerHTML = `
    <span class="card-badge ${t.badgeClass}">${t.label}</span>
    <div class="card-nombre">${c.cc || 'Sin nombre'}</div>
    <div class="card-direccion">
      ${icoSVG('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>')}
      <span>${c.direccion || 'Sin dirección registrada'}</span>
    </div>
    ${c.descripcion ? `<p class="card-descripcion">${c.descripcion}</p>` : ''}
    <div class="card-section-title">Información general</div>
    <div class="card-info-row">
      <div class="card-info-icon">${icoSVG('<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>')}</div>
      <div><div class="card-info-label">Horario</div><div class="card-info-value">${c.horario || 'No disponible'}</div></div>
    </div>
    ${c.zona ? `<div class="card-info-row">
      <div class="card-info-icon">${icoSVG('<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>')}</div>
      <div><div class="card-info-label">Zona</div><div class="card-info-value">${c.zona}</div></div>
    </div>` : ''}
    <div class="card-section-title">Actividades y clases</div>
    ${clasesHTML}
    <div class="card-section-title">Contacto</div>
    ${c.coordinadora ? `<div class="card-info-row">
      <div class="card-info-icon">${icoSVG('<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>')}</div>
      <div><div class="card-info-label">Coordinadora</div><div class="card-info-value">${c.coordinadora}</div></div>
    </div>` : `<span style="font-size:11px;color:var(--texto-hint);font-weight:500;">Sin contacto registrado</span>`}
  `;

  document.getElementById('card-panel').classList.add('visible');
  document.querySelectorAll('.lista-item').forEach(el => el.classList.remove('activo'));
  const item = document.querySelector(`.lista-item[data-id="${CSS.escape(c.cc)}"]`);
  if (item) { item.classList.add('activo'); item.scrollIntoView({ block: 'nearest' }); }
}

function cerrarPanel() {
  document.getElementById('card-panel').classList.remove('visible');
  document.querySelectorAll('.lista-item').forEach(el => el.classList.remove('activo'));
}

function centrosFiltrados() {
  const q = document.getElementById('buscador').value.toLowerCase();
  return centros.filter(c => {
    const matchTipo = filtroActivo === 'todos' || tipoKey(c.tipo) === filtroActivo;
    const matchQ    = !q || (c.cc || '').toLowerCase().includes(q) || (c.zona || '').toLowerCase().includes(q);
    return matchTipo && matchQ;
  });
}

function renderLista() {
  const f = centrosFiltrados();
  document.getElementById('lista-count').textContent = `${f.length} centro${f.length !== 1 ? 's' : ''}`;
  if (!f.length) {
    document.getElementById('lista-centros').innerHTML = `<div class="lista-empty">Sin resultados</div>`;
    return;
  }
  document.getElementById('lista-centros').innerHTML = f.map(c => {
    const tipo = tipoKey(c.tipo), t = TIPOS[tipo];
    const safeId    = c.cc.replace(/"/g, '&quot;');
    const safeClick = c.cc.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<div class="lista-item" data-id="${safeId}" onclick="seleccionarCentro('${safeClick}')">
      <span class="lista-dot" style="background:${t.color}"></span>
      <div>
        <div class="lista-nombre">${c.cc}</div>
        <div class="lista-meta">
          ${c.zona ? `<span class="lista-zona">${c.zona}</span>` : ''}
          <span class="lista-tipo-tag ${t.tagClass}">${t.label}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderMarcadores() {
  markers.forEach(m => m.remove()); markers = [];
  centrosFiltrados().forEach(c => {
    const lat = parseFloat(c.lat), lng = parseFloat(c.lng);
    if (isNaN(lat) || isNaN(lng)) return;
    const m = L.marker([lat, lng], { icon: makeIcon(tipoKey(c.tipo)) }).addTo(map);
    m.on('click', () => mostrarTarjeta(c));
    markers.push(m);
  });
}

function actualizarVista() { renderLista(); renderMarcadores(); }

function seleccionarCentro(nombre) {
  const c = centros.find(x => x.cc === nombre);
  if (!c) return;
  mostrarTarjeta(c);
  const lat = parseFloat(c.lat), lng = parseFloat(c.lng);
  if (!isNaN(lat) && !isNaN(lng)) map.flyTo([lat, lng], 15, { duration: 0.8 });
}

function cargarDatos() {
  const cbName = 'cb_' + Date.now();
  const script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName]; script.remove();
    centros = Array.isArray(data) ? data : [];
    document.getElementById('total-count').textContent   = centros.length;
    document.getElementById('cc-count').textContent      = centros.filter(c => tipoKey(c.tipo) === 'cc').length;
    document.getElementById('cedefam-count').textContent = centros.filter(c => tipoKey(c.tipo) === 'cedefam').length;
    document.getElementById('stem-count').textContent    = centros.filter(c => tipoKey(c.tipo) === 'stem').length;
    document.getElementById('loader').style.display      = 'none';
    actualizarVista();
    const lats = centros.map(c => parseFloat(c.lat)).filter(n => !isNaN(n));
    const lngs = centros.map(c => parseFloat(c.lng)).filter(n => !isNaN(n));
    if (lats.length) map.fitBounds([[Math.min(...lats),Math.min(...lngs)],[Math.max(...lats),Math.max(...lngs)]], { padding: [40,40] });
  };
  script.onerror = function() {
    delete window[cbName]; script.remove();
    document.getElementById('loader').innerHTML = '<span style="color:#e8197d;font-size:12px;font-weight:600;">Error al conectar. Verifica que el script esté publicado como "Cualquier persona".</span>';
  };
  script.src = SHEET_URL + '?callback=' + cbName;
  document.head.appendChild(script);
}

map = L.map('map').setView([28.6780, -106.1050], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 19
}).addTo(map);

document.querySelectorAll('.filtro-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filtroActivo = btn.dataset.filtro;
    document.querySelectorAll('.filtro-btn').forEach(b => b.className = 'filtro-btn');
    btn.classList.add('active-' + filtroActivo);
    actualizarVista();
  });
});
document.getElementById('buscador').addEventListener('input', actualizarVista);

cargarDatos();
</script>
</body>
</html>
